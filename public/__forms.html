<!-- Static skeleton for Netlify Forms build-time detection only -->
<html>
  <body>
    <form name="inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="inquiry" />
      <input name="full-name" />
      <input name="email" />
      <input name="phone" />
      <input name="company" />
      <input name="category" />
      <textarea name="project-description"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
